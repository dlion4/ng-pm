<!-- Aside Backdrop -->
<div class="aside-backdrop" [class.show]="openPanel !== null" (click)="onClose()"></div>

<aside class="right-aside" [class.open]="openPanel !== null" aria-label="Context panel">

    <!-- Security Controls Panel -->
    <div class="aside-panel-content" [class.active]="openPanel === 'security'">
        <div class="aside-header">
            <span class="aside-title"><i class="bi bi-shield-shaded text-primary"></i> Security Controls</span>
            <button class="aside-close" (click)="onClose()"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="aside-body">
            <div class="aside-card">
                <h6>Transaction Alerts</h6>
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <span class="fw-semibold" style="font-size:0.85rem">All Transactions</span>
                    <div class="form-check form-switch m-0"><input class="form-check-input" type="checkbox" checked></div>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <span class="fw-semibold" style="font-size:0.85rem">International Usage</span>
                    <div class="form-check form-switch m-0"><input class="form-check-input" type="checkbox" checked></div>
                </div>
                <div class="d-flex justify-content-between align-items-center">
                    <span class="fw-semibold" style="font-size:0.85rem">Large Threshold (&gt;KES 100K)</span>
                    <div class="form-check form-switch m-0"><input class="form-check-input" type="checkbox"></div>
                </div>
            </div>
            <div class="aside-card">
                <h6>Usage Controls</h6>
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <span class="fw-semibold" style="font-size:0.85rem">Online Payments (CNP)</span>
                    <div class="form-check form-switch m-0"><input class="form-check-input" type="checkbox" checked></div>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <span class="fw-semibold" style="font-size:0.85rem">Contactless / NFC</span>
                    <div class="form-check form-switch m-0"><input class="form-check-input" type="checkbox" checked></div>
                </div>
                <div class="d-flex justify-content-between align-items-center">
                    <span class="fw-semibold" style="font-size:0.85rem">ATM Withdrawals</span>
                    <div class="form-check form-switch m-0"><input class="form-check-input" type="checkbox"></div>
                </div>
            </div>
            <button class="btn btn-primary w-100" (click)="onToast('Security settings saved','success')">Save Changes</button>
        </div>
    </div>

    <!-- Spend Limits Panel -->
    <div class="aside-panel-content" [class.active]="openPanel === 'limits'">
        <div class="aside-header">
            <span class="aside-title"><i class="bi bi-sliders text-primary"></i> Spend Limits</span>
            <button class="aside-close" (click)="onClose()"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="aside-body">
            <div class="aside-card">
                <h6>Daily Limits</h6>
                <div class="mb-3"><label class="form-label fw-semibold" style="font-size:0.82rem">Per Transaction</label><input type="text" class="form-control" value="$5,000"></div>
                <div class="mb-3"><label class="form-label fw-semibold" style="font-size:0.82rem">Daily Total</label><input type="text" class="form-control" value="$25,000"></div>
                <div><label class="form-label fw-semibold" style="font-size:0.82rem">Monthly Total</label><input type="text" class="form-control" value="$100,000"></div>
            </div>
            <button class="btn btn-primary w-100" (click)="onToast('Limits updated','success')">Update Limits</button>
        </div>
    </div>

    <!-- Card Program Panel -->
    <div class="aside-panel-content" [class.active]="openPanel === 'cardProgram'">
        <div class="aside-header">
            <span class="aside-title"><i class="bi bi-gear text-primary"></i> Card Program</span>
            <button class="aside-close" (click)="onClose()"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="aside-body">
            <div class="aside-card">
                <h6>Program Info</h6>
                <div class="status-row"><span class="text-muted" style="font-size:0.82rem">Program</span><span class="fw-semibold" style="font-size:0.82rem">Paymo Platinum</span></div>
                <div class="status-row"><span class="text-muted" style="font-size:0.82rem">Issuer</span><span class="fw-semibold" style="font-size:0.82rem">Visa</span></div>
                <div class="status-row"><span class="text-muted" style="font-size:0.82rem">Cards Issued</span><span class="fw-semibold" style="font-size:0.82rem">1,240</span></div>
                <div class="status-row"><span class="text-muted" style="font-size:0.82rem">Status</span><span class="d-flex align-items-center" style="font-size:0.75rem"><span class="status-dot active"></span>Active</span></div>
            </div>
            <div class="aside-card">
                <h6>Branding</h6>
                <div class="mb-3"><label class="form-label fw-semibold" style="font-size:0.82rem">Card Label</label><input type="text" class="form-control" value="Paymo Platinum"></div>
                <div><label class="form-label fw-semibold" style="font-size:0.82rem">Card Color</label>
                    <div class="d-flex gap-2">
                        <div class="rounded-circle" style="width:32px;height:32px;background:#1e293b;cursor:pointer;border:2px solid var(--paymo-primary)"></div>
                        <div class="rounded-circle" style="width:32px;height:32px;background:#5b4ddb;cursor:pointer"></div>
                        <div class="rounded-circle" style="width:32px;height:32px;background:#10b981;cursor:pointer"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</aside>
