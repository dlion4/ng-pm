<header [class]="headerClasses">
    <div class="d-flex align-items-center gap-3">
        <button class="sidebar-toggle" (click)="onToggleSidebar()"><i [class]="toggleIconClass"></i></button>
        <div class="global-search d-none d-md-block"><i class="bi bi-search search-icon"></i><input type="text" placeholder="Search billers, meters, history…" /></div>
    </div>
    <div class="header-actions">
        <div class="d-none d-sm-flex align-items-center gap-2 px-3 py-2 rounded-3" style="background:linear-gradient(135deg,rgba(245,158,11,0.08),rgba(245,158,11,0.02));border:1px solid rgba(245,158,11,0.2);color:var(--paymo-warning);font-weight:700;font-size:0.82rem"><i class="bi bi-wallet2"></i><span>KES 124,500</span></div>
        <div class="vr d-none d-lg-block mx-1" style="height:28px;opacity:0.15"></div>
        <button class="header-action" (click)="onOpenAside('autoPay')"><i class="bi bi-calendar-check action-icon"></i></button>
        <div class="position-relative" data-dropdown="notifications">
            <button class="header-action" (click)="toggleDropdown('notifications', $event)" [attr.aria-expanded]="isDropdownOpen('notifications')"><i class="bi bi-bell action-icon"></i><span class="header-badge">3</span></button>
            <div class="dropdown-panel" [class.show]="isDropdownOpen('notifications')">
                <div class="panel-header"><span class="panel-title">Utility Alerts</span><button class="btn btn-sm btn-link text-decoration-none" style="font-size:0.75rem">Clear all</button></div>
                <div class="panel-body"><div class="notification-item unread"><div class="notification-icon warning"><i class="bi bi-lightning"></i></div><div class="flex-grow-1"><div class="fw-semibold" style="font-size:0.82rem">Token Generated</div><div class="text-muted" style="font-size:0.75rem">KPLC Token: 4729-8301...</div></div><span class="text-muted" style="font-size:0.7rem">2m</span></div></div>
                <div class="panel-footer text-center"><button class="btn btn-sm btn-link text-decoration-none fw-semibold" style="color:var(--paymo-warning)">View all</button></div>
            </div>
        </div>
        <div class="position-relative" data-dropdown="user">
            <button class="user-trigger" (click)="toggleDropdown('user', $event)" [attr.aria-expanded]="isDropdownOpen('user')">
                <div class="avatar" style="background:linear-gradient(135deg,#f59e0b,#d97706)">JK</div>
                <div class="user-meta"><div class="user-name">James K.</div><div class="user-role">Account Holder</div></div>
                <i class="bi bi-chevron-down chev" style="font-size:0.8rem"></i>
            </button>
            <div class="dropdown-panel" [class.show]="isDropdownOpen('user')" style="width:280px">
                <div class="p-3 d-flex align-items-center gap-3 border-bottom"><div style="width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem">JK</div><div><div class="fw-bold" style="font-size:0.9rem">James K.</div><div class="text-muted" style="font-size:0.75rem">james@paymo.co</div></div></div>
                <div class="panel-body"><div class="d-flex flex-column"><button class="btn btn-light text-start rounded-0 border-0 py-2 px-3"><i class="bi bi-person"></i> Profile</button><button class="btn btn-light text-start rounded-0 border-0 py-2 px-3"><i class="bi bi-gear"></i> Settings</button><button class="btn btn-light text-start rounded-0 border-0 py-2 px-3" (click)="onOpenAside('autoPay', $event)"><i class="bi bi-calendar-check"></i> Auto-Pay</button></div></div>
                <div class="panel-footer"><button class="btn btn-outline-danger w-100 d-flex align-items-center justify-content-center gap-2" style="font-size:0.82rem" (click)="onLogout()"><i class="bi bi-box-arrow-right"></i> Log out</button></div>
            </div>
        </div>
    </div>
</header>
<div class="toast-container-custom"><div class="paymo-toast" *ngFor="let t of toasts" [class.leaving]="t.isLeaving"><div class="toast-ic" [style.background]="t.bg" [style.color]="t.color"><i class="bi {{ t.icon }}"></i></div><div class="flex-grow-1"><div class="fw-semibold" style="font-size:0.82rem">{{ t.title }}</div><div class="text-muted" style="font-size:0.75rem">{{ t.message }}</div></div><button class="btn btn-link text-muted p-0 ms-2" style="font-size:0.8rem" (click)="removeToast(t.id)"><i class="bi bi-x-lg"></i></button></div></div>
